<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hastane İşlem Takip Sistemi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; border-top: 8px solid #007bff; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .patient-info { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .status-badge { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.9em; float: right; }
        .detail { color: #555; margin: 10px 0; font-size: 1.1em; }
        .footer { text-align: center; font-size: 0.8em; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h1> Hastane Takip Sistemi version </h1>
    <div class="patient-info">
        <span class="status-badge">Aktif Kayıt</span>
        <div class="detail"><strong>Hasta:</strong> Nisa Danış</div>
        <div class="detail"><strong>Bölüm:</strong> Göz Polikliniği</div>
        <div class="detail"><strong>Durum:</strong> Aktif güncellendi </div>
    </div>
    <div class="detail" style="text-align: center;">
        <strong>Sistem Saati:</strong> <span id="time"></span>
    </div>
</div>
<script>
    document.getElementById('time').innerText = new Date().toLocaleString('tr-TR');
</script>
</body>
</html>
